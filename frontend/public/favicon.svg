<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Mic head -->
  <rect x="22" y="14" width="20" height="28" rx="10" fill="url(#mic)"/>
  <!-- Mic stand curve -->
  <path d="M16 30 Q16 44 32 44 Q48 44 48 30" fill="none" stroke="url(#mic)" stroke-width="4" stroke-linecap="round"/>
  <!-- Mic stand vertical -->
  <line x1="32" y1="44" x2="32" y2="50" stroke="url(#mic)" stroke-width="4" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="24" y1="50" x2="40" y2="50" stroke="url(#mic)" stroke-width="4" stroke-linecap="round"/>
  <!-- Shine -->
  <ellipse cx="26" cy="22" rx="3" ry="5" fill="white" opacity="0.4"/>
</svg>
